[build]
  command = "npm run build"
  publish = "dist"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ':!supabase' ':!.github' ':!*.md'"

[[redirects]]
  from = "https://socionics-match.netlify.app/*"
  to = "https://socion.app/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
